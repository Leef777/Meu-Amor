<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Rafaela ❤️</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: radial-gradient(circle, #000000, #050505);
    font-family: 'Georgia', serif;
    overflow: hidden;
}

/* CARTA */
.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    text-align: center;
    max-width: 650px;
    padding: 50px;
    border-radius: 20px;
    background: linear-gradient(145deg, #ffffff, #f3f3f3);
    box-shadow: 0 0 80px rgba(255,215,0,0.25);
    animation: openLetter 1.5s ease forwards;
}

/* TÍTULO */
h1 {
    color: #c9a646;
    font-size: 42px;
    margin-bottom: 25px;
    letter-spacing: 2px;
}

/* TEXTO */
p {
    font-size: 20px;
    line-height: 1.8;
    color: #000;
    opacity: 1;
}

/* ANIMAÇÃO CARTA ABRINDO */
@keyframes openLetter {
    0% {
        opacity: 0;
        transform: translate(-50%, -60%) scale(0.5);
    }
    100% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
    }
}

/* TEXTO DIGITANDO */
.cursor {
    border-right: 2px solid black;
    animation: blink 0.7s infinite;
}

@keyframes blink {
    50% { border-color: transparent; }
}

/* CORAÇÕES */
.heart {
    position: absolute;
    color: gold;
    animation: float 6s linear infinite;
    opacity: 0.6;
}

@keyframes float {
    0% {
        transform: translateY(100vh) scale(0.5);
        opacity: 0;
    }
    50% { opacity: 1; }
    100% {
        transform: translateY(-10vh) scale(1.2);
        opacity: 0;
    }
}

/* BOTÃO */
button {
    margin-top: 25px;
    padding: 12px 28px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(135deg, gold, #c9a646);
    color: black;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

/* SURPRESA */
.surprise {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: black;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* FOTO */
.surprise img {
    width: 260px;
    border-radius: 20px;
    margin-bottom: 20px;
    box-shadow: 0 0 40px rgba(255,215,0,0.4);
    animation: zoom 1.5s ease;
}

/* TEXTO FINAL */
.surprise h1 {
    color: gold;
    font-size: 45px;
    animation: pulse 1s infinite;
}

@keyframes zoom {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

@keyframes pulse {
    0%{transform: scale(1);}
    50%{transform: scale(1.15);}
    100%{transform: scale(1);}
}

</style>
</head>

<body>

<!-- MÚSICA -->
<audio autoplay loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
</audio>

<div class="container">
    <h1>Rafaela ❤️</h1>
    <p id="text"></p>
    <button onclick="showSurprise()">Abrir surpresa 💌</button>
</div>

<!-- SURPRESA -->
<div class="surprise" id="surpresa">
    <img src="foto.jpg" alt="Nós dois ❤️">
    <h1>EU TE AMO ❤️</h1>
    <p style="color:white;">Pra sempre nós.</p>
</div>

<script>

/* TEXTO */
const message = [
"Se você está lendo isso...",
"é porque eu quis fazer algo único pra você.",
"Entre todas as pessoas do mundo...",
"foi você que mudou tudo pra mim.",
"Você é meu pensamento favorito.",
"Meu sorriso mais sincero.",
"E a melhor parte dos meus dias.",
"Eu não quero só momentos...",
"Eu quero uma vida inteira com você.",
"Rafaela...",
"Eu te amo ❤️"
];

let i = 0;
const textElement = document.getElementById("text");

function typeWriter() {
    if (i < message.length) {
        let line = message[i];
        let j = 0;

        let interval = setInterval(() => {
            textElement.innerHTML += line.charAt(j);
            j++;

            if (j === line.length) {
                clearInterval(interval);
                textElement.innerHTML += "<br><br>";
                i++;
                setTimeout(typeWriter, 700);
            }
        }, 40);
    }
}

typeWriter();

/* CORAÇÕES */
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 400);

/* SURPRESA */
function showSurprise(){
    document.getElementById("surpresa").style.display = "flex";
}

</script>

</body>
</html>
